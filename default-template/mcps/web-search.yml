# web-search.yml — SearXNG instance for privacy-respecting web search
#
# SearXNG is a metasearch engine that aggregates results from 70+
# search engines without tracking or profiling users. Use as an
# alternative to Google Custom Search / Bing Search API / SerpAPI.
#
# Port: 8888 (loopback) or Tailscale
# No auth by default (it's a search proxy, not a stateful service)
# Rate limiting is per-IP via SearXNG's built-in limiter
#
# IMPORTANT:
# - The default config blocks many engines. Edit settings.yml to
#   enable/disable specific engines.
# - SearXNG results can be flaky; treat as one source among many.
# - The "json" output format is what MCP clients should request.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: mcp-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      # Persist SearXNG config + cache across restarts
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/healthz"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"